<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="本殷运营">
<meta name="theme-color" content="#3D3832">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>本殷运营管理</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar"><div class="topbar-inner">
  <a href="#" class="topbar-brand" onclick="nav('dashboard');return false"><div class="topbar-brand-icon">B</div>本殷运营</a>
  <nav class="topbar-nav" id="topNav">
    <a href="#" data-view="dashboard" class="active"><span class="nav-icon">📊</span>总览</a>
    <a href="#" data-view="calendar"><span class="nav-icon">📅</span>发布日历</a>
    <a href="#" data-view="creation"><span class="nav-icon">✏️</span>内容创作</a>
    <a href="#" data-view="ai"><span class="nav-icon">⚡</span>AI创作</a>
    <a href="#" data-view="drafts"><span class="nav-icon">📋</span>待发布</a>
    <a href="#" data-view="tracking"><span class="nav-icon">📈</span>数据追踪</a>
    <a href="#" data-view="ideas"><span class="nav-icon">💡</span>灵感库</a>
  </nav>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="syncStatus" style="font-size:11px;color:var(--success);display:none">● 已同步</span>
    <button class="mobile-btn" onclick="toggleMb()">☰</button>
  </div>
</div>
<nav class="mobile-nav" id="mobileNav">
  <a href="#" data-view="dashboard" onclick="nav('dashboard')">📊 总览</a>
  <a href="#" data-view="calendar" onclick="nav('calendar')">📅 发布日历</a>
  <a href="#" data-view="creation" onclick="nav('creation')">✏️ 内容创作</a>
  <a href="#" data-view="ai" onclick="nav('ai')">⚡ AI创作</a>
  <a href="#" data-view="drafts" onclick="nav('drafts')">📋 待发布</a>
  <a href="#" data-view="tracking" onclick="nav('tracking')">📈 数据追踪</a>
  <a href="#" data-view="ideas" onclick="nav('ideas')">💡 灵感库</a>
</nav></header>

<main class="main">

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">
  <div class="stat-row" id="statCards"></div>
  <div class="card card-shadow"><div class="card-header" style="display:flex;justify-content:space-between;align-items:center">账号矩阵<button class="btn btn-pri btn-sm" onclick="openAddAccount()" style="font-size:12px;padding:3px 10px">+ 新增账号</button><button class="btn btn-del-mode btn-sm" id="delModeBtn" onclick="toggleDeleteMode()" style="font-size:12px;padding:3px 10px">删除</button></div><div class="card-body"><div class="acc-grid" id="accCards"></div></div></div>
</div>

<!-- CALENDAR -->
<div class="page" id="page-calendar">
  <div class="cal-wrap">
    <div class="card card-shadow"><div class="card-body">
      <div class="cal-header"><div class="cal-month" id="calMonthLabel"></div><div class="cal-nav"><button class="cal-nav-btn" onclick="calShift(-1)">◀</button><button class="cal-nav-btn" onclick="calShift(1)">▶</button></div></div>
      <div class="cal-grid" id="calGrid"></div>
    </div></div>
    <div class="cal-layout">
      <div class="card card-shadow"><div class="card-header">当日任务</div><div class="card-body" id="dateTasks"></div></div>
      <div class="card card-shadow"><div class="card-header">未来7天</div><div class="card-body" id="upcomingList"></div></div>
    </div>
  </div>
</div>

<!-- CREATION -->
<div class="page" id="page-creation">
  <div class="card card-shadow"><div class="card-header">内容创作</div><div class="card-body">
    <div class="flex flex-wrap gap-8 mb-16" id="creationTabs"></div>
    <div class="table-wrap" id="creationTable"></div>
  </div></div>
</div>

<!-- AI CREATION -->
<div class="page" id="page-ai">
  <div class="card card-shadow"><div class="card-body">
    <div class="ai-steps" id="aiSteps"></div>
    <div id="aiContent"></div>
  </div></div>
</div>

<!-- DRAFTS -->
<div class="page" id="page-drafts">
  <div class="flex items-center justify-between mb-16"><span style="font-size:18px;font-weight:700">待发布内容</span><span class="text-sm text-muted">AI生成的内容保存在这里，可快速应用到内容创作</span></div>
  <div id="draftsList"></div>
</div>

<!-- TRACKING -->
<div class="page" id="page-tracking">
  <!-- 1. 账号数据总览 -->
  <div class="card card-shadow mb-16"><div class="card-header">账号数据总览</div><div class="card-body"><div class="table-wrap" id="trackingTable"></div></div></div>
  <!-- 2. 每周数据小结 -->
  <div class="card card-shadow mb-16"><div class="card-header">每周数据小结</div><div class="card-body"><div class="table-wrap" id="weeklyTable"></div></div></div>
  <!-- 3. 快捷数据录入 -->
  <div class="card card-shadow mb-16"><div class="card-header">快捷数据录入</div><div class="card-body">
    <div class="text-xs text-muted mb-8">填入主页链接后点击打开，对照手动输入三项核心数据</div>
    <div class="quick-data-row">
      <select class="form-sel" id="qdAccount" onchange="updateQDPlatforms()" style="min-width:110px"><option value="">选择账号</option></select>
      <select class="form-sel" id="qdPlatform" style="min-width:100px"><option value="">先选账号</option></select>
      <input class="form-inp" id="qdUrl" placeholder="主页链接 https://..." style="flex:1;min-width:200px">
      <button class="btn btn-sec btn-sm" onclick="savePlatformUrl()" title="预存此链接，下次自动填充">💾</button>
      <button class="btn btn-sec btn-sm" onclick="openProfileUrl()">打开对照</button>
    </div>
    <div class="quick-data-inputs" style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:100px"><small class="text-muted">粉丝数</small><input class="form-inp" type="number" id="qdFollowers" placeholder="0"></div>
      <div style="flex:1;min-width:100px"><small class="text-muted">获赞数</small><input class="form-inp" type="number" id="qdLikes" placeholder="0"></div>
      <div style="flex:1;min-width:100px"><small class="text-muted">观看数</small><input class="form-inp" type="number" id="qdViews" placeholder="0"></div>
      <button class="btn btn-pri btn-sm" onclick="saveQuickData()" style="align-self:flex-end;margin-bottom:1px">保存数据</button>
    </div>
  </div></div>
  <!-- 4. 数据可视化 -->
  <div class="card card-shadow mb-16"><div class="card-header">数据可视化</div><div class="card-body">
    <div class="viz-controls">
      <select class="form-sel" id="vizAccount" onchange="rviz()" style="min-width:110px"><option value="">全部账号</option></select>
      <select class="form-sel" id="vizPlatform" onchange="rviz()" style="min-width:100px"><option value="">全部平台</option></select>
      <input class="form-inp" type="date" id="vizDateFrom" onchange="rviz()" style="min-width:130px" placeholder="起始日期">
      <span class="text-sm text-muted">至</span>
      <input class="form-inp" type="date" id="vizDateTo" onchange="rviz()" style="min-width:130px" placeholder="结束日期">
      <select class="form-sel" id="vizMetric" onchange="rviz()" style="min-width:100px">
        <option value="followers">粉丝</option>
        <option value="views">观看</option>
        <option value="likes">点赞</option>
      </select>
    </div>
    <div class="viz-charts">
      <div class="viz-chart-box"><h4>趋势折线图</h4><canvas id="vizLineChart"></canvas></div>
      <div class="viz-chart-box"><h4>对比柱状图</h4><canvas id="vizBarChart"></canvas></div>
    </div>
  </div></div>
  <!-- 5. 已录入数据 -->
  <div class="card card-shadow mb-16"><div class="card-header">已录入数据</div><div class="card-body">
    <div class="flex items-center gap-8 mb-8" style="flex-wrap:wrap">
      <input class="form-inp" type="date" id="alDateFrom" onchange="renderAnalyticsList()" style="min-width:130px" placeholder="起始日期">
      <span class="text-sm text-muted">至</span>
      <input class="form-inp" type="date" id="alDateTo" onchange="renderAnalyticsList()" style="min-width:130px" placeholder="结束日期">
      
    </div>
    <div id="analyticsList"></div>
    <div id="analyticsPager" style="margin-top:10px;text-align:center"></div>
  </div></div>
</div>

<!-- IDEAS -->
<div class="page" id="page-ideas">
  <div class="flex items-center justify-between mb-16"><span style="font-size:18px;font-weight:700">选题灵感库</span><button class="btn btn-pri" onclick="openIdeaModal()">+ 新增灵感</button></div>
  <div class="idea-grid" id="ideaCards"></div>
</div>


<!-- Add Account Modal -->
<div class="modal-overlay" id="addAccountModal"><div class="modal" style="max-width:420px">
  <h3>添加新账号</h3>
  <div class="form-grp"><label class="form-lbl">账号名称</label><input class="form-inp" id="newAccName" placeholder="例如：新账号名"></div>
  <div class="form-grp"><label class="form-lbl">账号类型</label><input class="form-inp" id="newAccType" placeholder="例如：Vlog/美食"></div>
  <div class="form-grp"><label class="form-lbl">发布频率</label><select class="form-sel" id="newAccPosting"><option value="odd">奇数日发布</option><option value="even">偶数日发布</option></select></div>
  <div class="form-grp"><label class="form-lbl">关联平台（用逗号或空格分隔）</label><input class="form-inp" id="newAccPlatforms" placeholder="例如：抖音 小红书 B站"></div>
  <div class="flex mt-16" style="justify-content:flex-end;gap:8px">
    <button class="btn btn-sec" onclick="closeAddAccount()">取消</button>
    <button class="btn btn-pri" onclick="saveNewAccount()">添加账号</button>
  </div>
</div></div>
</main>

<!-- Idea Modal -->
<div class="modal-overlay" id="ideaModal"><div class="modal">
  <h3 id="ideaModalTitle">新增灵感</h3>
  <div class="form-grp"><label class="form-lbl">所属账号</label><select class="form-sel" id="ideaAccount"></select></div>
  <div class="form-grp"><label class="form-lbl">灵感分类</label><input class="form-inp" id="ideaCat" placeholder="如: Vlog日常"></div>
  <div class="form-grp"><label class="form-lbl">灵感描述</label><textarea class="form-txt" id="ideaDesc" placeholder="详细描述..."></textarea></div>
  <div class="form-grp"><label class="form-lbl">执行计划</label><textarea class="form-txt" id="ideaPlan" placeholder="怎么拍? 需要什么?"></textarea></div>
  
  <div class="form-grp"><label class="form-lbl">优先级</label><select class="form-sel" id="ideaPriority"><option>P1</option><option>P2</option><option>P3</option></select></div>
  <div class="flex gap-8" style="justify-content:flex-end"><button class="btn btn-sec" onclick="closeIdeaModal()">取消</button><button class="btn btn-pri" id="ideaSaveBtn" onclick="saveIdea()">保存</button></div>
</div></div>


<!-- Add Content Modal -->
<div class="modal-overlay" id="addContentModal"><div class="modal" style="max-width:440px">
  <h3 id="addContentTitle">新增内容</h3>
  <div class="form-grp"><label class="form-lbl">账号</label><select class="form-sel" id="addAcc" onchange="updateAddPlatforms()"><option value="">请选择账号</option></select></div>
  <div class="form-grp"><label class="form-lbl">平台</label><select class="form-sel" id="addPlat"><option value="">请先选择账号</option></select></div>
  <div class="form-grp"><label class="form-lbl">日期</label><input class="form-inp" type="date" id="addDate"></div>
  <div class="flex mt-16" style="justify-content:flex-end;gap:8px"><button class="btn btn-sec" onclick="closeAddContent()">取消</button><button class="btn btn-pri" onclick="saveAddContent()">保存</button></div>
</div></div>

<!-- Draft Picker Modal -->
<div class="modal-overlay" id="draftPicker"><div class="modal" id="draftPickerBody"></div></div>

<!-- Content Edit Modal -->
<div class="modal-overlay" id="contentModal"><div class="modal modal-sticky" id="contentModalWrap">
  <div class="modal-sticky-top"><h3 id="contentModalTitle">编辑内容</h3></div>
  <div class="modal-scroll" id="contentModalBody"></div>
  <div class="modal-sticky-bot"><button class="btn btn-sec" onclick="closeContentModal()">取消</button><button class="btn btn-pri" onclick="saveContent()">保存</button></div>
</div></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="app.js"></script>
</body>
</html>
